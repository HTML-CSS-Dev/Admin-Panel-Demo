<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>


<div class="flex gap-6 h-[100vh]">

<!-- order panel -->
<aside class="w-80 bg-white rounded-2xl shadow-xl p-6  border border-gray-100">
  
  <!-- Header -->
  <div class="flex items-center justify-between mb-5">
    <h3 class="text-xl font-bold text-gray-800">🧾 Buyurtma</h3>
    <span class="text-sm text-gray-400">#001</span>
  </div>

  <!-- Info -->
  <div class="space-y-3 text-gray-700">
    <div class="flex justify-between">
      <span class="font-medium">User</span>
      <span>Ali</span>
    </div>

    <div class="flex justify-between">
      <span class="font-medium">Ovqat</span>
      <span>Lavash 🌯</span>
    </div>

    <div class="flex justify-between">
      <span class="font-medium">Quantity</span>
      <span>1x</span>
    </div>
  </div>

  <!-- Divider -->
  <div class="border-t my-4"></div>

  <!-- Total -->
  <div class="flex justify-between items-center">
    <span class="text-lg font-semibold text-gray-800">Total</span>
    <span class="text-lg font-bold text-green-600">
      25 000 so'm
    </span>
  </div>

  <!-- Button -->
  <button class="mt-5 w-full bg-green-500 hover:bg-green-600 text-white py-2 rounded-xl font-semibold transition">
    Buyurtma berish
  </button>

</aside>



<!-- cards -->
<div id="father" class="flex justify-between h-[470px]"></div>

</div>
    <script type="module" src="./scripts/index.js"></script>
</body>
</html>
