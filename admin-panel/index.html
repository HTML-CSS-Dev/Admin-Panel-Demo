<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>


<div class="flex m-auto justify-between h-[100vh]">

<!-- order panel -->
<aside class="w-80 bg-white rounded-2xl shadow-xl p-6  border border-gray-100">
  
  <!-- Header -->
  <div class="flex items-center justify-between mb-5">
    <h3 class="text-xl font-bold text-gray-800">🧾 Buyurtma</h3>
    <span class="text-sm text-gray-400">#001</span>
  </div>

  <!-- Info -->
  <div class="space-y-3 text-gray-700">
    <div class="flex justify-between">
      <span class="font-medium">User</span>
      <span>Ali</span>
    </div>

    <div class="flex justify-between">
      <span class="font-medium">Ovqat</span>
      <select name="" id="select-food">
        <option value="Burger">Burger</option>
        <option value="Hot Dog">Hot Dog</option>
        <option value="Chips">Chips</option>
      </select>  
    </div>

    <div class="flex justify-between">
      <span class="font-medium">Quantity</span>
      <span id="quantity">0</span> <!-- backend --> 
    </div>
  </div>

  <!-- Divider -->
  <div class="border-t my-4"></div>

  <!-- Total -->
  <div class="flex justify-between items-center">
    <span class="text-lg font-semibold text-gray-800">Total</span>
    <span class="text-lg font-bold text-green-600">$<span class="text-black" id="total">0</span></span>
  </div>
</aside>



<!-- cards -->
<div id="father" class="flex gap-[10px] h-[480px] pt-3"></div></div>
    <script type="module" src="./scripts/index.js"></script>
</body>
</html>
