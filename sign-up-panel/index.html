<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
  <form id="send" class="flex flex-col w-80 p-6 mx-auto mt-40 bg-white rounded-2xl shadow-lg gap-5">

  <h2 class="text-2xl font-bold text-center text-gray-700">Sign In</h2>

  <div class="flex flex-col gap-1">
    <label for="fname" class="text-sm text-gray-600">Full Name</label>
    <input 
      type="text" 
      id="fname"
      placeholder="Enter your name"
      maxlength="30" 
      required
      class="px-3 py-2 border border-gray-300 rounded-lg outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
    >
    <p id="nameError" class="hidden text-sm ml-1 text-red-600"> At least 5 characters are required </p>
  </div>

  <div class="flex flex-col gap-1">
    <label for="pass" class="text-sm text-gray-600">Password</label>
    <input 
      type="password" 
      id="pass"
      placeholder="Enter your password"
      maxlength="30" 
      required
      class="px-3 py-2 border border-gray-300 rounded-lg outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
    >
        <p id="passError" class="hidden text-sm ml-1 text-red-600"> At least 8 characters are required </p>
  </div>

  <input 
    type="submit"
    value="Log in"
    class="mt-2 py-2 rounded-lg bg-blue-500 text-white font-semibold cursor-pointer transition duration-300 hover:bg-blue-600 active:scale-95"
  >


</form>
    <script type="module" src="./scripts/index.js"></script>
</body>
</html>
